name: Documentation
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      pull-requests: read
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      # Same reason as in CI.yml: building the docs loads MeanFieldHom →
      # TensND → SymPy, which needs the Python `sympy` module that the
      # runner's /usr/bin/python3 lacks.
      - name: Install dependencies (PyCall/SymPy)
        run: |
          julia -e '
            using Pkg
            ENV["PYTHON"] = ""
            Pkg.add("PyCall")
            Pkg.add("SymPy")
            Pkg.build("PyCall")
            using PyCall
            pyimport_conda("sympy", "sympy")'
      - name: Install dependencies
        shell: julia --project=docs/ --color=yes {0}
        run: |
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()
      - name: Build and deploy
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --project=docs/ docs/make.jl
