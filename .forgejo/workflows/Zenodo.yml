name: Zenodo

# IMPORTANT: This workflow requires a Zenodo concept (parent record) to exist.
# MeanFieldHom.jl has NOT been archived on Zenodo yet — before the first run:
#   1. Go to zenodo.org → "New Upload" and create a minimal record manually:
#        title       = "MeanFieldHom.jl"
#        upload type = Software / Computer program
#        creator     = Jean-François Barthélémy (Cerema, UMR MCD)
#        license     = MIT
#        keywords    = Julia, micromechanics, mean-field homogenisation,
#                      Hill polarisation tensor, cracks, Eshelby
#      Upload a `git archive` tarball of HEAD, publish to obtain a DOI.
#   2. On the published record, look up the "Concept DOI" — the number after
#      the slash in `10.5281/zenodo.NNNNNNN` is the concept ID.
#   3. Replace the placeholder `CONCEPT_ID=000000000` below with that number.
#   4. Add the badge to README.md and the DOI to CITATION.cff.
#
# Note: MeanFieldHom.jl consolidates 30+ years of micromechanics literature
# (Hill 1965, Eshelby 1957, Mura, Walpole, Masson, …). Zenodo archiving
# here is for the *Julia implementation* — primary references are cited in
# CITATION.cff under `references:` and in the documentation bibliography.

on:
  workflow_dispatch:

jobs:
  zenodo:
    runs-on: codeberg-medium-lazy

    steps:
      - uses: actions/checkout@v4

      - name: Read version from Project.toml
        id: version
        run: |
          VERSION=$(grep '^version' Project.toml | sed 's/version = "\(.*\)"/\1/')
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Zenodo — create new version draft
        id: zenodo_draft
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          ZCURL="curl -s --retry 5 --retry-delay 30 --max-time 60"
          CONCEPT_ID=000000000   # ← replace with MeanFieldHom.jl concept ID
          LATEST=$($ZCURL "https://zenodo.org/api/records?q=conceptrecid:$CONCEPT_ID&sort=mostrecent&size=1" \
            -H "Authorization: Bearer $ZENODO_TOKEN")
          LATEST_ID=$(echo "$LATEST" | grep -o '"id": *[0-9][0-9]*' | head -1 | tr -dc '0-9')
          if [ -z "$LATEST_ID" ]; then
            echo "ERROR: could not find latest published version (Zenodo may be down or CONCEPT_ID not set)"
            exit 1
          fi
          echo "Latest published version ID: $LATEST_ID"
          RESPONSE=$($ZCURL -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://zenodo.org/api/records/$LATEST_ID/versions" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            -H "Content-Type: application/json")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "Create version status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "201" ]; then
            NEW_ID=$(echo "$BODY" | grep -o '"id": *[0-9][0-9]*' | head -1 | tr -dc '0-9')
            echo "New draft created: $NEW_ID"
          else
            echo "Create failed (${BODY:0:200}), searching for existing draft..."
            DRAFTS=$($ZCURL \
              "https://zenodo.org/api/user/records?q=conceptrecid:$CONCEPT_ID&is_draft=true&sort=mostrecent&size=1" \
              -H "Authorization: Bearer $ZENODO_TOKEN")
            echo "Existing drafts: ${DRAFTS:0:300}"
            NEW_ID=$(echo "$DRAFTS" | grep -o '"id": *[0-9][0-9]*' | head -1 | tr -dc '0-9')
            if [ -z "$NEW_ID" ]; then
              echo "ERROR: could not create or find a draft (Zenodo may be down — retry later)"
              exit 1
            fi
            echo "Reusing existing draft: $NEW_ID"
          fi
          echo "new_id=$NEW_ID" >> $GITHUB_OUTPUT
          echo "latest_id=$LATEST_ID" >> $GITHUB_OUTPUT
          echo "Draft ID: $NEW_ID  (from published: $LATEST_ID)"

      - name: Zenodo — update version metadata
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          ZCURL="curl -s --retry 5 --retry-delay 30 --max-time 120"
          NEW_ID="${{ steps.zenodo_draft.outputs.new_id }}"
          VERSION="${{ steps.version.outputs.value }}"
          TODAY=$(date +%Y-%m-%d)
          TMPFILE=$(mktemp)
          python3 -c "
          import sys, json
          meta = {
              'resource_type': {'type': 'software', 'subtype': 'computer-program'},
              'creators': [{'person_name': 'Jean-François Barthélémy', 'affiliation': 'Cerema, UMR MCD'}],
              'title': 'MeanFieldHom.jl',
              'version': sys.argv[1],
              'publication_date': sys.argv[2],
              'description': 'Julia framework for mean-field homogenisation of heterogeneous materials. Hill polarisation tensors for ellipsoidal inclusions and infinite cylinders, crack-opening-displacement tensors with stress and displacement intensity factors for flat cracks, second-order Hill tensors for transport problems, and layered-sphere composite models. Ships type-generic Legendre and Carlson elliptic integrals.',
              'access_right': 'open',
              'license': 'MIT',
              'related_identifiers': []
          }
          json.dump({'metadata': meta}, sys.stdout)
          " "$VERSION" "$TODAY" > "$TMPFILE"
          echo "Metadata payload: $(cat "$TMPFILE")"
          RESP=$($ZCURL -w "\nHTTP_STATUS:%{http_code}" -X PUT \
            "https://zenodo.org/api/records/$NEW_ID/draft" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            -H "Content-Type: application/json" \
            -d @"$TMPFILE")
          RESP_STATUS=$(echo "$RESP" | grep "HTTP_STATUS:" | cut -d: -f2)
          RESP_BODY=$(echo "$RESP" | grep -v "HTTP_STATUS:")
          echo "Metadata update status: $RESP_STATUS"
          rm -f "$TMPFILE"
          if [ "$RESP_STATUS" != "200" ]; then
            echo "ERROR: metadata update failed: ${RESP_BODY:0:500}"
            exit 1
          fi

      - name: Zenodo — upload source archive
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          ZCURL="curl -s --retry 3 --retry-delay 20 --max-time 120"
          NEW_ID="${{ steps.zenodo_draft.outputs.new_id }}"
          VERSION="${{ steps.version.outputs.value }}"
          FILENAME="MeanFieldHom.jl-v${VERSION}.tar.gz"
          echo "Draft ID: $NEW_ID  Archive: $FILENAME"
          git archive --format=tar.gz --prefix="MeanFieldHom.jl-${VERSION}/" -o "$FILENAME" HEAD
          ls -lh "$FILENAME"
          # Delete any existing files on the draft before uploading the new archive.
          FILES_RESP=$($ZCURL "https://zenodo.org/api/records/$NEW_ID/draft/files" \
            -H "Authorization: Bearer $ZENODO_TOKEN")
          echo "Existing files: $FILES_RESP"
          FILE_KEYS=$(echo "$FILES_RESP" | grep -o '"key": *"[^"]*"' | sed 's/"key": *"//;s/"//' || true)
          for key in $FILE_KEYS; do
            ENCODED_KEY=$(echo "$key" | sed 's|/|%2F|g')
            echo "Deleting: $key"
            $ZCURL -X DELETE \
              "https://zenodo.org/api/records/$NEW_ID/draft/files/$ENCODED_KEY" \
              -H "Authorization: Bearer $ZENODO_TOKEN"
          done
          INIT=$($ZCURL -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://zenodo.org/api/records/$NEW_ID/draft/files" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "[{\"key\": \"$FILENAME\"}]")
          echo "Init status: $(echo "$INIT" | grep "HTTP_STATUS:" | cut -d: -f2)"
          UPLOAD=$(curl -s --max-time 300 -w "\nHTTP_STATUS:%{http_code}" -X PUT \
            "https://zenodo.org/api/records/$NEW_ID/draft/files/$FILENAME/content" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$FILENAME")
          UPLOAD_STATUS=$(echo "$UPLOAD" | grep "HTTP_STATUS:" | cut -d: -f2)
          echo "Upload status: $UPLOAD_STATUS"
          if [ "$UPLOAD_STATUS" != "200" ]; then
            echo "ERROR: upload failed"; exit 1
          fi
          COMMIT=$($ZCURL -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://zenodo.org/api/records/$NEW_ID/draft/files/$FILENAME/commit" \
            -H "Authorization: Bearer $ZENODO_TOKEN")
          COMMIT_STATUS=$(echo "$COMMIT" | grep "HTTP_STATUS:" | cut -d: -f2)
          echo "Commit status: $COMMIT_STATUS"
          if [ "$COMMIT_STATUS" != "200" ]; then
            echo "ERROR: commit failed"; exit 1
          fi

      # Publishing the draft from CI fails intermittently with 400 even on
      # valid metadata. Trigger this workflow to get the draft + archive ready,
      # then click "Publish" manually on https://zenodo.org/uploads.
      # - name: Zenodo — publish
      #   env:
      #     ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
      #   run: |
      #     ZCURL="curl -s --retry 3 --retry-delay 20 --max-time 60"
      #     NEW_ID="${{ steps.zenodo_draft.outputs.new_id }}"
      #     RESP=$($ZCURL -w "\nHTTP_STATUS:%{http_code}" -X POST \
      #       "https://zenodo.org/api/records/$NEW_ID/draft/actions/publish" \
      #       -H "Authorization: Bearer $ZENODO_TOKEN")
      #     HTTP_STATUS=$(echo "$RESP" | grep "HTTP_STATUS:" | cut -d: -f2)
      #     echo "Publish status: $HTTP_STATUS"
      #     if [ "$HTTP_STATUS" != "202" ]; then
      #       echo "ERROR: $(echo "$RESP" | grep -v "HTTP_STATUS:")"
      #       exit 1
      #     fi
      #     echo "Published Zenodo version ${{ steps.version.outputs.value }}"
